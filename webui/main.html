<div class="telegram-dashboard" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: 16px;">
    <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid var(--border-color, #e0e0e0);">
        <h3 style="margin: 0; color: #0088cc;">Telegram Integration</h3>
        <span data-tgm="status-badge" style="padding: 3px 10px; border-radius: 10px; font-size: 11px; font-weight: 600; background: #fce4ec; color: #c62828;">Checking...</span>
    </div>

    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-bottom: 16px;">
        <div style="text-align: center; padding: 10px; background: var(--bg-secondary, #f8f9fa); border-radius: 6px;">
            <div style="font-size: 20px; font-weight: 700; color: #0088cc;" data-tgm="chat-count">-</div>
            <div style="font-size: 11px; color: var(--text-secondary, #888);">Bridge Chats</div>
        </div>
    </div>

    <div style="display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;">
        <button onclick="window._tgMain.test()" style="background: #0088cc; color: #fff; border: none; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 12px;">Test Connection</button>
    </div>

    <!-- Chat Bridge Section -->
    <div style="padding-top: 12px; border-top: 1px solid var(--border-color, #e0e0e0);">
        <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 10px;">
            <h4 style="margin: 0; color: #0088cc;">Chat Bridge</h4>
            <span data-tgm="bridge-status" style="padding: 2px 8px; border-radius: 8px; font-size: 10px; font-weight: 600; background: #f5f5f5; color: #888;">Unknown</span>
        </div>
        <div style="display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px;">
            <button onclick="window._tgMain.bridge('start', this)" style="background: #43a047; color: #fff; border: none; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 12px;">Start Bridge</button>
            <button onclick="window._tgMain.bridge('stop', this)" style="background: #e53935; color: #fff; border: none; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 12px;">Stop Bridge</button>
            <button onclick="window._tgMain.bridge('restart', this)" style="background: #ff9800; color: #fff; border: none; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 12px;">Restart Bridge</button>
            <button onclick="window._tgMain.bridge('status', this)" style="background: var(--bg-secondary, #f0f0f0); color: var(--text-primary, #333); border: none; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 12px;">Refresh Status</button>
        </div>
        <div data-tgm="bridge-info" style="font-size: 11px; color: var(--text-secondary, #888);"></div>
    </div>
</div>

<script>
(function() {
    function fetchApi(url, opts) { return (globalThis.fetchApi || fetch)(url, opts); }
    var API_TEST = '/api/plugins/telegram/telegram_test';
    var API_BRIDGE = '/api/plugins/telegram/telegram_bridge_api';

    function $(sel) { return document.querySelector('[data-tgm="' + sel + '"]'); }

    function setBridgeBadge(status) {
        var badge = $('bridge-status');
        var chatCount = $('chat-count');
        if (chatCount && status.chat_count !== undefined) chatCount.textContent = status.chat_count;
        if (!badge) return;
        if (status.running && status.status === 'connected') {
            badge.textContent = 'Connected' + (status.user ? ' as ' + status.user : '');
            badge.style.background = '#e8f5e9'; badge.style.color = '#2e7d32';
        } else if (status.running) {
            badge.textContent = status.status || 'Connecting...';
            badge.style.background = '#fff3e0'; badge.style.color = '#e65100';
        } else {
            badge.textContent = status.status || 'Stopped';
            badge.style.background = '#f5f5f5'; badge.style.color = '#888';
        }
    }

    async function bridgeAction(action, btn) {
        if (btn) { btn.disabled = true; btn.style.opacity = '0.6'; }
        var info = $('bridge-info');
        try {
            var resp = await fetchApi(API_BRIDGE, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({action: action})
            });
            var data = await resp.json();
            setBridgeBadge(data);
            if (info) {
                if (data.ok) {
                    info.textContent = data.message || '';
                    info.style.color = '#2e7d32';
                } else {
                    info.textContent = data.error || 'Unknown error';
                    info.style.color = '#c62828';
                }
                setTimeout(function() { info.textContent = ''; }, 5000);
            }
        } catch (e) {
            if (info) { info.textContent = 'API unavailable'; info.style.color = '#c62828'; }
        }
        if (btn) { btn.disabled = false; btn.style.opacity = '1'; }
    }

    async function testConnection() {
        var badge = $('status-badge');
        if (!badge) return;
        badge.textContent = 'Testing...';
        badge.style.background = '#fff3e0'; badge.style.color = '#e65100';
        try {
            var resp = await fetchApi(API_TEST, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: '{}'
            });
            var data = await resp.json();
            if (data.ok) {
                badge.textContent = 'Connected as ' + data.user;
                badge.style.background = '#e8f5e9'; badge.style.color = '#2e7d32';
            } else {
                badge.textContent = data.error || 'Error';
                badge.style.background = '#fce4ec'; badge.style.color = '#c62828';
            }
        } catch (e) {
            badge.textContent = 'API unavailable';
            badge.style.background = '#fce4ec'; badge.style.color = '#c62828';
        }
    }

    window._tgMain = { test: testConnection, bridge: bridgeAction };
    setTimeout(function() { testConnection(); bridgeAction('status'); }, 50);
})();
</script>
